<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exnova Signal Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e1e1e1; min-height: 100vh; }

    header {
      background: #1a1d2e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2d3e;
    }
    header h1 { font-size: 1.3rem; color: #7c6af7; }
    #clock { font-size: 1.1rem; color: #a0a0b0; font-variant-numeric: tabular-nums; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .status-card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .status-card .label { font-size: .75rem; color: #7a7a9a; text-transform: uppercase; letter-spacing: .05em; }
    .status-card .value { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }
    .online  { color: #4ade80; }
    .offline { color: #f87171; }
    .test-mode { color: #facc15; }
    .real-mode { color: #60a5fa; }

    .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-yellow { background: #facc15; color: #1a1a1a; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    .btn-red    { background: #ef4444; color: #fff; }
    .btn-gray   { background: #374151; color: #e1e1e1; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 { font-size: 1rem; margin-bottom: 16px; color: #a0a0c0; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: .8rem; color: #7a7a9a; margin-bottom: 4px; }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 7px;
      color: #e1e1e1;
      font-size: .9rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .signals-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .signals-table th { text-align: left; padding: 8px 10px; color: #7a7a9a; border-bottom: 1px solid #2a2d3e; }
    .signals-table td { padding: 8px 10px; border-bottom: 1px solid #1e2030; }
    .signals-table tr:hover td { background: #1e2035; }

    .log-list { max-height: 280px; overflow-y: auto; }
    .log-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1e2030;
      font-size: .85rem;
      flex-wrap: wrap;
    }
    .log-time { color: #7a7a9a; min-width: 70px; }
    .empty { color: #4a4a6a; text-align: center; padding: 20px; }

    .badge {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-call   { background: #14532d; color: #4ade80; }
    .badge-put    { background: #450a0a; color: #f87171; }
    .badge-otc    { background: #1e1b4b; color: #818cf8; }
    .badge-normal { background: #1c3148; color: #60a5fa; }
    .badge-ok     { background: #14532d; color: #4ade80; }
    .badge-fail   { background: #450a0a; color: #f87171; }
    .badge-test   { background: #422006; color: #facc15; }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Exnova Signal Bot</h1>
  <span id="clock">--:--:--</span>
</header>

<div class="container">

  <!-- Status -->
  <div class="status-bar">
    <div class="status-card">
      <div class="label">Status</div>
      <div class="value" id="statusVal">Offline</div>
    </div>
    <div class="status-card">
      <div class="label">Modo</div>
      <div class="value" id="modeVal">—</div>
    </div>
    <div class="status-card">
      <div class="label">Próximo Sinal</div>
      <div class="value" id="nextVal">—</div>
    </div>
    <div class="status-card">
      <div class="label">Executados Hoje</div>
      <div class="value" id="execVal">0</div>
    </div>
  </div>

  <!-- Controles -->
  <div class="controls">
    <button class="btn btn-yellow" onclick="startBot('test')">🧪 Modo Teste</button>
    <button class="btn btn-blue"   onclick="startBot('real')">🚀 Modo Real</button>
    <button class="btn btn-red"    onclick="stopBot()">⏹ Parar Bot</button>
  </div>

  <div class="grid">

    <!-- Formulário -->
    <div class="card">
      <h2>➕ Adicionar Sinal</h2>

      <div class="form-row">
        <div class="form-group">
          <label>Horário</label>
          <input type="time" id="sigTime" step="60">
        </div>
        <div class="form-group">
          <label>Mercado</label>
          <select id="sigMarket" onchange="updatePairs()">
            <option value="normal">Normal</option>
            <option value="otc">OTC</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Par</label>
        <select id="sigPair"></select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Direção</label>
          <select id="sigDir">
            <option value="call">📈 CALL (Compra)</option>
            <option value="put">📉 PUT (Venda)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Expiração (min)</label>
          <select id="sigExp">
            <option value="1">1 min</option>
            <option value="2">2 min</option>
            <option value="3">3 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Valor da operação ($)</label>
        <input type="number" id="sigAmount" value="10" min="1" step="0.5">
      </div>

      <button class="btn btn-blue" style="width:100%;margin-top:4px" onclick="addSignal()">
        ➕ Adicionar Sinal
      </button>
    </div>

    <!-- Sinais agendados -->
    <div class="card">
      <h2>📋 Sinais Agendados</h2>
      <table class="signals-table">
        <thead>
          <tr>
            <th>Horário</th>
            <th>Par</th>
            <th>Dir.</th>
            <th>Exp.</th>
            <th>Valor</th>
            <th>Mercado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="signalsList">
          <tr><td colspan="7" class="empty">Nenhum sinal</td></tr>
        </tbody>
      </table>
      <button class="btn btn-gray" style="margin-top:12px;font-size:.8rem" onclick="clearAll()">
        🗑 Limpar Todos
      </button>
    </div>

    <!-- Log -->
    <div class="card" style="grid-column: 1 / -1">
      <h2>📜 Log de Execuções</h2>
      <div class="log-list" id="logList">
        <div class="empty">Nenhuma execução ainda</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Pares ─────────────────────────────────────────────────────────────
const PAIRS_NORMAL = [
  "EURUSD","GBPUSD","USDJPY","USDCHF","AUDUSD","USDCAD",
  "NZDUSD","EURGBP","EURJPY","GBPJPY","EURAUD","EURCHF",
  "AUDCAD","AUDCHF","AUDJPY","CADJPY","CHFJPY","EURCAD",
  "EURNZD","GBPAUD","GBPCAD","GBPCHF","GBPNZD","NZDCAD",
  "NZDCHF","NZDJPY","XAUUSD","XAGUSD"
];

const PAIRS_OTC = [
  "EURUSD-OTC","GBPUSD-OTC","USDJPY-OTC","USDCHF-OTC",
  "AUDUSD-OTC","USDCAD-OTC","NZDUSD-OTC","EURGBP-OTC",
  "EURJPY-OTC","GBPJPY-OTC","EURAUD-OTC","EURCHF-OTC",
  "AUDCAD-OTC","AUDCHF-OTC","AUDJPY-OTC","CADJPY-OTC",
  "CHFJPY-OTC","EURCAD-OTC","EURNZD-OTC","GBPAUD-OTC",
  "GBPCAD-OTC","GBPCHF-OTC","GBPNZD-OTC","NZDCAD-OTC",
  "NZDCHF-OTC","NZDJPY-OTC","XAUUSD-OTC","XAGUSD-OTC"
];

function updatePairs() {
  const market = document.getElementById("sigMarket").value;
  const pairs  = market === "otc" ? PAIRS_OTC : PAIRS_NORMAL;
  const sel    = document.getElementById("sigPair");
  sel.innerHTML = pairs.map(p =>
    `<option value="${p}">${p}</option>`
  ).join("");
}
updatePairs();

// ── Relógio ───────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("pt-BR");
}
setInterval(updateClock, 1000);
updateClock();

// ── API helper ────────────────────────────────────────────────────────
async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...opts
  });
  return res.json();
}

// ── Status ────────────────────────────────────────────────────────────
async function updateStatus() {
  const d = await api("/api/status");

  const statusEl = document.getElementById("statusVal");
  statusEl.textContent = d.running ? "Online" : "Offline";
  statusEl.className   = "value " + (d.running ? "online" : "offline");

  const modeEl = document.getElementById("modeVal");
  if (d.mode === "test") {
    modeEl.textContent = "🧪 Teste";
    modeEl.className   = "value test-mode";
  } else {
    modeEl.textContent = "🚀 Real";
    modeEl.className   = "value real-mode";
  }

  const next = d.next_signal;
  document.getElementById("nextVal").textContent =
    next ? next.split(" ")[1]?.slice(0, 5) ?? "—" : "—";

  document.getElementById("execVal").textContent = d.executed_today ?? 0;
}

// ── Log ───────────────────────────────────────────────────────────────
async function updateLog() {
  const logs = await api("/api/log");
  const el   = document.getElementById("logList");

  if (!logs.length) {
    el.innerHTML = '<div class="empty">Nenhuma execução ainda</div>';
    return;
  }

  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <span class="log-time">${l.time}</span>
      <strong>${l.pair}</strong>
      <span class="badge badge-${l.direction}">${l.direction.toUpperCase()}</span>
      <span class="badge badge-${l.market === 'OTC' ? 'otc' : 'normal'}">${l.market}</span>
      <span>${l.expiration}min</span>
      <span>$${parseFloat(l.amount).toFixed(2)}</span>
      <span class="badge badge-${l.mode === 'test' ? 'test' : (l.success ? 'ok' : 'fail')}">
        ${l.mode === 'test' ? '🧪 TESTE' : (l.success ? '✅ OK' : '❌ ERRO')}
      </span>
    </div>
  `).join("");
}

// ── Sinais ────────────────────────────────────────────────────────────
async function loadSignals() {
  const signals = await api("/api/signals");
  const tbody   = document.getElementById("signalsList");

  if (!signals.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Nenhum sinal</td></tr>';
    return;
  }

  tbody.innerHTML = signals.map(s => `
    <tr>
      <td>${s.time}</td>
      <td>${s.pair}</td>
      <td><span class="badge badge-${s.direction}">${s.direction.toUpperCase()}</span></td>
      <td>${s.expiration}min</td>
      <td>$${parseFloat(s.amount).toFixed(2)}</td>
      <td>
        <span class="badge badge-${s.market === 'otc' ? 'otc' : 'normal'}">
          ${s.market === 'otc' ? 'OTC' : 'Normal'}
        </span>
      </td>
      <td><button class="delete-btn" onclick="deleteSignal(${s.id})">✕</button></td>
    </tr>
  `).join("");
}

async function addSignal() {
  const time       = document.getElementById("sigTime").value;
  const pair       = document.getElementById("sigPair").value;
  const direction  = document.getElementById("sigDir").value;
  const expiration = parseInt(document.getElementById("sigExp").value);
  const amount     = parseFloat(document.getElementById("sigAmount").value);
  const market     = document.getElementById("sigMarket").value;

  if (!time) { alert("Informe o horário do sinal."); return; }

  await api("/api/signals", {
    method: "POST",
    body: JSON.stringify({ time, pair, direction, expiration, amount, market })
  });

  loadSignals();
}

async function deleteSignal(id) {
  await api(`/api/signals/${id}`, { method: "DELETE" });
  loadSignals();
}

async function clearAll() {
  if (!confirm("Remover todos os sinais?")) return;
  await api("/api/signals/clear", { method: "DELETE" });
  loadSignals();
}

// ── Bot ───────────────────────────────────────────────────────────────
async function startBot(mode) {
  if (mode === "real" && !confirm("⚠️ Iniciar em MODO REAL?\nIsso vai executar operações com dinheiro real!")) return;
  await api("/api/bot/start", { method: "POST", body: JSON.stringify({ mode }) });
  updateStatus();
}

async function stopBot() {
  await api("/api/bot/stop", { method: "POST" });
  updateStatus();
}

// ── Polling ───────────────────────────────────────────────────────────
loadSignals();
updateStatus();
updateLog();
setInterval(() => { updateStatus(); updateLog(); }, 5000);
setInterval(loadSignals, 10000);
</script>

</body>
</html>
